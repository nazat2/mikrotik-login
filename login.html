<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>nazat ⋆ wifi</title>
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />	
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div style="display: none;">
        $(if chap-id)
        <form name="sendin" action="$(link-login-only)" method="post">
            <input type="hidden" name="username" />
            <input type="hidden" name="password" />
            <input type="hidden" name="dst" value="$(link-orig)" />
            <input type="hidden" name="popup" value="true" />
        </form>
        
        <script type="text/javascript" src="md5.js"></script>
        <script type="text/javascript">
        <!--
            function doLogin() {
                document.sendin.username.value = document.login.username.value;
                document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
                document.sendin.submit();
                return false;
            }
        //-->
        </script>
        $(endif)
    </div>

    <div class="bg"></div>

    <div class="login-container">
        <!-- Left side with image -->
        <div class="hero">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <div class="logo">
                    <i class="fas fa-wifi"></i>
                    <span>nazat</span>
                </div>
            </div>
        </div>

        <!-- Right side with login form -->
        <div class="login-section">
            <div class="login-wrapper">
                <div class="login-header">
                    <h2>yokoso</h2>
                    <p>masukan username dan password</p>
                </div>

                <form class="login-form" name="login" action="$(link-login-only)" method="post"
                    $(if chap-id) onSubmit="return doLogin()" $(endif)>
                    <input type="hidden" name="dst" value="https://www.instagram.com/nxzxt_/" />
                    <input type="hidden" name="popup" value="true" />
                    
                    <div class="field">
                        <label for="user">
                            <i class="fas fa-user"></i>
                            <span>username</span>
                        </label>
                        <div class="input-wrap">
                            <input type="text" id="user" name="username" autocomplete="on" placeholder="enter your username">
                        </div>
                    </div>
                    
                    <div class="field">
                        <label for="pass">
                            <i class="fas fa-lock"></i>
                            <span>password</span>
                        </label>
                        <div class="input-wrap">
                            <input type="password" id="pass" name="password" autocomplete="off" placeholder="enter your password">
                        </div>
                    </div>
                    
                    <button type="submit" name="submit" id="boton">
                        <span>sign in</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <div class="login-footer">
                    <a href="https://www.instagram.com/nxzxt_" target="_blank">
                        <i class="fab fa-instagram"></i>
                        <span>@nxzxt_</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.login.username.focus();
        document.oncontextmenu = function(){return false;}
    </script>
</body>
</html>
